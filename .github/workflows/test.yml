name: Tests & Quality
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck on all .sh files
        run: find . -name "*.sh" -not -path "*/node_modules/*" -not -path "*/.git/*" -exec shellcheck -x -S warning -e SC1091 -e SC2034 -e SC2155 -e SC2164 -e SC2011 {} +

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Verify sqlite3
        run: sqlite3 --version
      - name: Verify jq
        run: jq --version
      - name: Run test suite
        run: ./tests/run-tests.sh

  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Verify ALL canonical version declarations are in sync
        run: |
          set -euo pipefail
          # plugin.json is the source of truth; every declaration must match it.
          # Mirrors test_version_sync_all in tests/run-tests.sh. Bump via
          # scripts/bump-version.sh, which updates all of these at once.
          V=$(jq -r '.version' .claude-plugin/plugin.json)
          echo "source of truth (plugin.json): $V"
          fail=0
          MV=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          [ "$MV" = "$V" ] || { echo "FAIL: marketplace.json ($MV) != $V"; fail=1; }
          grep -qF "<kernel version=\"$V\">" CLAUDE.md           || { echo "FAIL: CLAUDE.md <kernel version> != $V"; fail=1; }
          grep -qF "KERNEL v$V" commands/help.md                 || { echo "FAIL: commands/help.md KERNEL version != $V"; fail=1; }
          grep -qF "kernel-marketplace/kernel/$V" README.md      || { echo "FAIL: README.md install-path version != $V"; fail=1; }
          if [ "$fail" -ne 0 ]; then
            echo "Version drift detected. Run: scripts/bump-version.sh $V"
            exit 1
          fi
          echo "All canonical version declarations in sync: $V"

  schema-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Verify inline schema matches schema.sql
        run: |
          set -euo pipefail

          AGENTDB_DIR="orchestration/agentdb"

          # Init via schema.sql (direct path)
          DIR_A=$(mktemp -d)
          mkdir -p "$DIR_A/_meta/agentdb"
          sqlite3 "$DIR_A/_meta/agentdb/agent.db" < "$AGENTDB_DIR/schema.sql"
          # Apply migrations
          for m in "$AGENTDB_DIR/migrations/"*.sql; do
            [ -f "$m" ] || continue
            sqlite3 "$DIR_A/_meta/agentdb/agent.db" < "$m"
          done
          sqlite3 "$DIR_A/_meta/agentdb/agent.db" ".schema" | sort > /tmp/schema_file.txt

          # Init via agentdb CLI (uses SCHEMA_DIR resolution to find schema.sql)
          DIR_B=$(mktemp -d)
          mkdir -p "$DIR_B/_meta/agentdb" "$DIR_B/.claude"
          AGENTDB_COPY=$(mktemp -d)
          cp "$AGENTDB_DIR/agentdb" "$AGENTDB_COPY/agentdb"
          cp "$AGENTDB_DIR/schema.sql" "$AGENTDB_COPY/schema.sql"
          cp -r "$AGENTDB_DIR/migrations" "$AGENTDB_COPY/migrations" 2>/dev/null || true
          chmod +x "$AGENTDB_COPY/agentdb"
          export PATH="$AGENTDB_COPY:$PATH"
          cd "$DIR_B"
          agentdb init >/dev/null
          sqlite3 "$DIR_B/_meta/agentdb/agent.db" ".schema" | sort > /tmp/schema_inline.txt

          # Compare
          if ! diff /tmp/schema_file.txt /tmp/schema_inline.txt; then
            echo "FAIL: schema.sql and inline schema produce different table structures"
            echo "--- schema.sql ---"
            cat /tmp/schema_file.txt
            echo "--- inline ---"
            cat /tmp/schema_inline.txt
            exit 1
          fi
          echo "Schema check passed: file and inline schemas match"

          # Cleanup
          rm -rf "$DIR_A" "$DIR_B" "$AGENTDB_COPY"
